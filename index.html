<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍦 Gelato Shop Management Hub</title>
    <style>
        /* --- 1. DESIGN VARIABLES --- */
        :root {
            --bg-main: #f9f6f0;
            --bg-card: #ffffff;
            --primary: #d4a373;
            --text-color: #333333;
            --border-color: #e6ccb2;
            --danger: #e63946;
            --safe: #4a4e69;
            --radius: 12px;
        }

        /* --- 2. BASIC RESET & LAYOUT STRUCTURE --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .app-container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 2px solid #f3e9dc;
            overflow: hidden;
        }

        /* --- 3. SEMANTIC SITE LAYOUT --- */
        header {
            background-color: var(--primary);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .main-layout {
            padding: 25px;
            background-color: var(--bg-card);
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 14px;
            color: #888;
            border-top: 1px solid var(--border-color);
            background-color: #fffbf7;
        }

        h2 {
            margin-bottom: 25px;
            color: var(--text-color);
            text-align: center;
        }

        /* --- 4. GELATO CARD GRID STYLES --- */
        .inventory-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .inventory-item {
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .inventory-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .inventory-item.out-of-season {
            background-color: #e0e0e0 !important;
            color: #888;
            border-color: #ccc;
        }

        .inventory-item.out-of-season strong {
            text-decoration: line-through;
        }

        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        /* --- 5. COUNTER COMPONENT (UP / DOWN BOX) --- */
        .counter-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: 6px;
            overflow: hidden;
        }

        .counter-btn {
            background: transparent;
            border: none;
            width: 32px;
            height: 32px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            font-weight: bold;
            transition: background 0.2s;
        }

        .counter-btn:hover {
            background: rgba(0, 0, 0, 0.08);
        }

        .counter-btn:first-child {
            border-right: 1px solid rgba(0,0,0,0.15);
        }

        .status-badge {
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            text-align: center;
            display: inline-block;
        }

        .status-badge.oos { background-color: var(--danger); color: white; }
        .status-badge.instock { background-color: rgba(255,255,255,0.8); color: #222; border: 1px solid rgba(0,0,0,0.05); }

        /* --- 6. CHECKBOX UTILITIES --- */
        .case-controls-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px dashed rgba(0,0,0,0.15);
        }

        .case-checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }

        .case-checkbox-label input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .season-toggle-link {
            font-size: 12px;
            color: #555;
            text-decoration: underline;
            cursor: pointer;
            align-self: flex-start;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <header>
        <h1>🍦 Gelato Shop Management Hub</h1>
    </header>

    <div class="main-layout">
        <h2>Current Gelato Canister Inventory</h2>
        <ul class="inventory-list" id="inventoryList"></ul>
    </div>

    <footer>
        <p>&copy; 2026 Gelato Shop POS System. All Rights Reserved.</p>
    </footer>

</div>

<script>
    // Flavor color matching profile using legible, pastel styles
    const flavorColors = {
        "Vanilla": "rgba(243, 229, 171, 0.4)",
        "Chocolate": "rgba(123, 63, 0, 0.2)",
        "Mint Chip": "rgba(152, 255, 152, 0.4)",
        "Lemon Cookie": "rgba(255, 244, 79, 0.3)",
        "Stracciatella": "rgba(234, 224, 213, 0.5)",
        "Nutty Squirrel": "rgba(205, 127, 50, 0.25)",
        "Ferrero Rocher": "rgba(184, 134, 11, 0.25)",
        "Lemon Mango Dragonfruit": "rgba(255, 140, 0, 0.25)",
        "Forest Berries": "rgba(106, 13, 173, 0.15)",
        "Cafe Latte": "rgba(200, 173, 127, 0.35)",
        "Pistachio": "rgba(147, 197, 114, 0.35)",
        "Banana Nutella": "rgba(227, 193, 111, 0.35)",
        "Turkish Coffee": "rgba(75, 54, 33, 0.18)",
        "Strawberry Dream": "rgba(255, 183, 197, 0.45)",
        "Mango": "rgba(255, 192, 77, 0.35)",
        "Vegan Dark Chocolate": "rgba(61, 35, 20, 0.15)",
        "Minty Dream": "rgba(170, 240, 209, 0.45)",
        "Ranier Smores": "rgba(210, 180, 140, 0.4)",
        "Bunny Kisses": "rgba(251, 204, 231, 0.45)",
        "Birthday Cake": "rgba(255, 192, 203, 0.45)",
        "Hazelnut": "rgba(174, 140, 104, 0.35)",
        "Gianduia": "rgba(160, 82, 45, 0.2)",
        "Kinder Bueno": "rgba(232, 216, 200, 0.45)",
        // Coordinated colors for new additions:
        "Sea Salt Caramel": "rgba(198, 150, 106, 0.35)",
        "Cookies and Dream": "rgba(140, 140, 140, 0.25)",
        "Mon Cherry": "rgba(222, 49, 99, 0.2)",
        "Banana Split": "rgba(255, 233, 133, 0.45)",
        "Strawberry Shortcake": "rgba(255, 153, 153, 0.35)",
        "Fior De Latte": "rgba(248, 249, 250, 0.8)",
        "Prickly pear": "rgba(255, 111, 145, 0.35)"
    };

    const defaultInventory = {
        "Vanilla": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Chocolate": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Mint Chip": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Lemon Cookie": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Stracciatella": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Nutty Squirrel": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Ferrero Rocher": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Lemon Mango Dragonfruit": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Forest Berries": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Cafe Latte": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Pistachio": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Banana Nutella": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Turkish Coffee": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Strawberry Dream": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Mango": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Vegan Dark Chocolate": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Minty Dream": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Ranier Smores": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Bunny Kisses": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Birthday Cake": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Hazelnut": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Gianduia": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Kinder Bueno": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        // New flavors appended into the tracking framework:
        "Sea Salt Caramel": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Cookies and Dream": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Mon Cherry": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Banana Split": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Strawberry Shortcake": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Fior De Latte": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false },
        "Prickly pear": { qty: 0, outOfSeason: false, inDisplayCase: false, inTransferCase: false }
    };

    let inventory = JSON.parse(localStorage.getItem('iceCreamInventory'));
    
    // Check if the local storage contains an old registry framework missing the new keys
    if (!inventory || !inventory["Sea Salt Caramel"]) {
        inventory = defaultInventory;
        localStorage.setItem('iceCreamInventory', JSON.stringify(inventory));
    }

    function saveToStorage() {
        localStorage.setItem('iceCreamInventory', JSON.stringify(inventory));
    }

    function adjustQty(flavor, amount) {
        inventory[flavor].qty = Math.max(0, inventory[flavor].qty + amount);
        saveToStorage();
        renderInventory();
    }

    function handleCaseToggle(flavor, caseKey, isChecked) {
        if (isChecked) {
            if (inventory[flavor].qty > 0) {
                inventory[flavor].qty -= 1;
                inventory[flavor][caseKey] = true;
            } else {
                alert(`Cannot place in case! You have 0 backup canisters of ${flavor} left.`);
                renderInventory(); 
                return;
            }
        } else {
            inventory[flavor].qty += 1;
            inventory[flavor][caseKey] = false;
        }
        
        saveToStorage();
        renderInventory();
    }

    function toggleSeason(flavor) {
        inventory[flavor].outOfSeason = !inventory[flavor].outOfSeason;
        saveToStorage();
        renderInventory();
    }

    function renderInventory() {
        const list = document.getElementById('inventoryList');
        list.innerHTML = ''; 

        for (const [flavor, data] of Object.entries(inventory)) {
            const li = document.createElement('li');
            li.className = `inventory-item ${data.outOfSeason ? 'out-of-season' : ''}`;
            
            li.style.backgroundColor = flavorColors[flavor] || "#fffbf7";
            
            const statusLabel = data.outOfSeason 
                ? '<span class="status-badge oos">Out of Season</span>' 
                : `<span class="status-badge instock">${data.qty} backup canisters</span>`;

            li.innerHTML = `
                <div>
                    <div class="card-header-row">
                        <strong>${flavor}</strong>
                        <div class="counter-box" style="${data.outOfSeason ? 'display:none;' : ''}">
                            <button class="counter-btn" onclick="adjustQty('${flavor}', 1)">▲</button>
                            <button class="counter-btn" onclick="adjustQty('${flavor}', -1)">▼</button>
                        </div>
                    </div>
                    <div style="margin-top: 8px;">${statusLabel}</div>
                    <div class="season-toggle-link" onclick="toggleSeason('${flavor}')">
                        ${data.outOfSeason ? 'Mark In Season' : 'Mark Out of Season'}
                    </div>
                </div>
                
                <div class="case-controls-group" style="${data.outOfSeason ? 'display:none;' : ''}">
                    <label class="case-checkbox-label">
                        <input type="checkbox" 
                               ${data.inDisplayCase ? 'checked' : ''} 
                               onchange="handleCaseToggle('${flavor}', 'inDisplayCase', this.checked)">
                        Canister in Display Case
                    </label>
                    <label class="case-checkbox-label">
                        <input type="checkbox" 
                               ${data.inTransferCase ? 'checked' : ''} 
                               onchange="handleCaseToggle('${flavor}', 'inTransferCase', this.checked)">
                        Canister in Transfer Case
                    </label>
                </div>
            `;
            list.appendChild(li);
        }
    }

    renderInventory();
</script>

</body>
</html>
