<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍦 Ice Cream Shop Management Hub</title>
    <style>
        /* --- 1. DESIGN VARIABLES --- */
        :root {
            --bg-main: #f9f6f0;
            --bg-card: #ffffff;
            --primary: #d4a373;
            --accent: #cb997e;
            --text-color: #333333;
            --border-color: #e6ccb2;
            --danger: #e63946;
            --safe: #4a4e69;
            --radius: 12px;
        }

        /* --- 2. BASIC RESET & LAYOUT STRUCTURE --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .app-container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 2px solid #f3e9dc;
            overflow: hidden;
        }

        /* --- 3. SEMANTIC SITE LAYOUT --- */
        header {
            background-color: var(--primary);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            min-height: 500px;
        }

        aside {
            background-color: #fffbf7;
            padding: 25px;
            border-right: 1px solid var(--border-color);
        }

        main {
            padding: 25px;
            background-color: var(--bg-card);
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 14px;
            color: #888;
            border-top: 1px solid var(--border-color);
            background-color: #fffbf7;
        }

        /* --- 4. COMPONENT STYLES --- */
        h2, h3 {
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        select, input[type="number"], button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 16px;
            margin-bottom: 10px;
        }

        button {
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, color 0.2s;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.2);
        }
        
        .btn-toggle { background-color: #6c757d; }
        .btn-toggle:hover { opacity: 0.9; }

        /* --- 5. INVENTORY LIST STYLES --- */
        .inventory-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .inventory-item {
            background: #fffbf7;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 10px;
            transition: border-color 0.2s;
        }

        .inventory-item.out-of-season {
            background-color: #f1f1f1;
            color: #999;
            border-color: #ddd;
        }

        .inventory-item.out-of-season strong {
            text-decoration: line-through;
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            align-self: flex-start;
        }

        .status-badge.oos { background-color: var(--danger); color: white; }
        .status-badge.instock { background-color: #e2eafc; color: var(--safe); }

        .display-case-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
            padding-top: 8px;
            border-top: 1px dashed var(--border-color);
            font-size: 14px;
        }

        .display-case-control input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* --- 6. RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
            aside {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <header>
        <h1>🍦 Scoop Manager Dashboard</h1>
    </header>

    <div class="main-layout">
        
        <aside>
            <h3>Stock Controls</h3>
            
            <div class="form-group">
                <label for="flavorSelect">Select Flavor</label>
                <select id="flavorSelect" onchange="applyButtonColor()">
                    <option value="Vanilla">Vanilla</option>
                    <option value="Chocolate">Chocolate</option>
                    <option value="Mint Chip">Mint Chip</option>
                    <option value="Lemon Cookie">Lemon Cookie</option>
                    <option value="Stracciatella">Stracciatella</option>
                    <option value="Nutty Squirrel">Nutty Squirrel</option>
                    <option value="Ferrero Rocher">Ferrero Rocher</option>
                    <option value="Lemon Mango Dragonfruit">Lemon Mango Dragonfruit</option>
                    <option value="Forest Berries">Forest Berries</option>
                    <option value="Cafe Latte">Cafe Latte</option>
                    <option value="Pistachio">Pistachio</option>
                    <option value="Banana Nutella">Banana Nutella</option>
                    <option value="Turkish Coffee">Turkish Coffee</option>
                    <option value="Strawberry Dream">Strawberry Dream</option>
                    <option value="Mango">Mango</option>
                    <option value="Vegan Dark Chocolate">Vegan Dark Chocolate</option>
                    <option value="Minty Dream">Minty Dream</option>
                    <option value="Ranier Smores">Ranier Smores</option>
                    <option value="Bunny Kisses">Bunny Kisses</option>
                    <option value="Birthday Cake">Birthday Cake</option>
                    <option value="Hazelnut">Hazelnut</option>
                    <option value="Gianduia">Gianduia</option>
                    <option value="Kinder Bueno">Kinder Bueno</option>
                </select>
            </div>

            <div class="form-group">
                <label for="stockChange">Adjustment Amount</label>
                <input type="number" id="stockChange" placeholder="Qty" value="1">
            </div>

            <button id="updateButton" onclick="updateStock()">Update Quantity</button>
            <button class="btn-toggle" onclick="toggleSeason()">Toggle Season</button>
        </aside>

        <main>
            <h2>Current Inventory Status</h2>
            <ul class="inventory-list" id="inventoryList"></ul>
        </main>

    </div>

    <footer>
        <p>&copy; 2026 Ice Cream Shop POS System. All Rights Reserved.</p>
    </footer>

</div>

<script>
    // Flavor coordinated pastel mapping scheme
    const flavorColors = {
        "Vanilla": "#f3e5ab",
        "Chocolate": "#7b3f00",
        "Mint Chip": "#98ff98",
        "Lemon Cookie": "#fff44f",
        "Stracciatella": "#eae0d5",
        "Nutty Squirrel": "#cd7f32",
        "Ferrero Rocher": "#b8860b",
        "Lemon Mango Dragonfruit": "#ff8c00",
        "Forest Berries": "#6a0dad",
        "Cafe Latte": "#c8ad7f",
        "Pistachio": "#93c572",
        "Banana Nutella": "#e3c16f",
        "Turkish Coffee": "#4b3621",
        "Strawberry Dream": "#ffb7c5",
        "Mango": "#ffc04d",
        "Vegan Dark Chocolate": "#3d2314",
        "Minty Dream": "#aaf0d1",
        "Ranier Smores": "#d2b48c",
        "Bunny Kisses": "#fbcce7",
        "Birthday Cake": "#ffc0cb",
        "Hazelnut": "#ae8c68",
        "Gianduia": "#a0522d",
        "Kinder Bueno": "#e8d8c8"
    };

    // Default configuration objects adjusted with the new tracking property 'inDisplayCase'
    const defaultInventory = {
        "Vanilla": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Chocolate": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Mint Chip": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Lemon Cookie": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Stracciatella": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Nutty Squirrel": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Ferrero Rocher": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Lemon Mango Dragonfruit": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Forest Berries": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Cafe Latte": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Pistachio": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Banana Nutella": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Turkish Coffee": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Strawberry Dream": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Mango": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Vegan Dark Chocolate": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Minty Dream": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Ranier Smores": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Bunny Kisses": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Birthday Cake": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Hazelnut": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Gianduia": { qty: 0, outOfSeason: false, inDisplayCase: false },
        "Kinder Bueno": { qty: 0, outOfSeason: false, inDisplayCase: false }
    };

    let inventory = JSON.parse(localStorage.getItem('iceCreamInventory'));
    
    // Ensure accurate structure setup and schema compliance
    if (!inventory || inventory.hasOwnProperty("Strawberry") || !inventory["Vanilla"].hasOwnProperty("inDisplayCase")) {
        inventory = defaultInventory;
        localStorage.setItem('iceCreamInventory', JSON.stringify(inventory));
    }

    function saveToStorage() {
        localStorage.setItem('iceCreamInventory', JSON.stringify(inventory));
    }

    // Handles changing button color to match flavor selection
    function applyButtonColor() {
        const selectedFlavor = document.getElementById('flavorSelect').value;
        const btn = document.getElementById('updateButton');
        const color = flavorColors[selectedFlavor] || 'var(--accent)';
        btn.style.backgroundColor = color;
        
        // Dynamic accessible text color choice based on light/dark pastel profiles
        if (["Chocolate", "Forest Berries", "Turkish Coffee", "Vegan Dark Chocolate"].includes(selectedFlavor)) {
            btn.style.color = "white";
        } else {
            btn.style.color = "#333333";
        }
    }

    // Directly toggles display case property updates from layout cards
    function toggleDisplayCase(flavor, isChecked) {
        inventory[flavor].inDisplayCase = isChecked;
        saveToStorage();
    }

    function renderInventory() {
        const list = document.getElementById('inventoryList');
        list.innerHTML = ''; 

        for (const [flavor, data] of Object.entries(inventory)) {
            const li = document.createElement('li');
            li.className = `inventory-item ${data.outOfSeason ? 'out-of-season' : ''}`;
            
            const statusLabel = data.outOfSeason 
                ? '<span class="status-badge oos">Out of Season</span>' 
                : `<span class="status-badge instock">${data.qty} canisters left</span>`;

            // Card body template tracking canister location checkboxes
            li.innerHTML = `
                <div>
                    <strong>${flavor}</strong>
                    <div style="margin-top: 5px;">${statusLabel}</div>
                </div>
                <label class="display-case-control">
                    <input type="checkbox" 
                           ${data.inDisplayCase ? 'checked' : ''} 
                           onchange="toggleDisplayCase('${flavor}', this.checked)">
                    Canister in Display Case
                </label>
            `;
            list.appendChild(li);
        }
    }

    function updateStock() {
        const flavor = document.getElementById('flavorSelect').value;
        const change = parseInt(document.getElementById('stockChange').value);

        if (isNaN(change)) {
            alert("Please enter a valid number!");
            return;
        }

        inventory[flavor].qty = Math.max(0, inventory[flavor].qty + change);
        saveToStorage();
        renderInventory();
    }

    function toggleSeason() {
        const flavor = document.getElementById('flavorSelect').value;
        inventory[flavor].outOfSeason = !inventory[flavor].outOfSeason;
        saveToStorage();
        renderInventory();
    }

    // Render baseline setup layouts on window initialization
    renderInventory();
    applyButtonColor();
</script>

</body>
</html>
