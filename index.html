<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍦 Ice Cream Shop Management Hub</title>
    <style>
        /* --- 1. DESIGN VARIABLES --- */
        :root {
            --bg-main: #f9f6f0;
            --bg-card: #ffffff;
            --primary: #d4a373;
            --accent: #cb997e;
            --accent-hover: #b7b7a4;
            --text-color: #333333;
            --border-color: #e6ccb2;
            --danger: #e63946;
            --safe: #4a4e69;
            --radius: 12px;
        }

        /* --- 2. BASIC RESET & LAYOUT STRUCTURE --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .app-container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 2px solid #f3e9dc;
            overflow: hidden;
        }

        /* --- 3. SEMANTIC SITE LAYOUT --- */
        header {
            background-color: var(--primary);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            min-height: 500px;
        }

        aside {
            background-color: #fffbf7;
            padding: 25px;
            border-right: 1px solid var(--border-color);
        }

        main {
            padding: 25px;
            background-color: var(--bg-card);
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 14px;
            color: #888;
            border-top: 1px solid var(--border-color);
            background-color: #fffbf7;
        }

        /* --- 4. COMPONENT STYLES --- */
        h2, h3 {
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        select, input[type="number"], button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 16px;
            margin-bottom: 10px;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background-color: var(--accent-hover); }
        
        .btn-toggle { background-color: #6c757d; }
        .btn-toggle:hover { background-color: #5a6268; }

        /* --- 5. INVENTORY LIST STYLES --- */
        .inventory-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .inventory-item {
            background: #fffbf7;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 10px;
        }

        .inventory-item.out-of-season {
            background-color: #f1f1f1;
            color: #999;
            border-color: #ddd;
        }

        .inventory-item.out-of-season strong {
            text-decoration: line-through;
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            align-self: flex-start;
        }

        .status-badge.oos { background-color: var(--danger); color: white; }
        .status-badge.instock { background-color: #e2eafc; color: var(--safe); }

        /* --- 6. RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
            aside {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <header>
        <h1>🍦 Scoop Manager Dashboard</h1>
    </header>

    <div class="main-layout">
        
        <aside>
            <h3>Stock Controls</h3>
            
            <div class="form-group">
                <label for="flavorSelect">Select Flavor</label>
                <select id="flavorSelect">
                    <option value="Vanilla">Vanilla</option>
                    <option value="Chocolate">Chocolate</option>
                    <option value="Mint Chip">Mint Chip</option>
                    <option value="Lemon Cookie">Lemon Cookie</option>
                    <option value="Stracciatella">Stracciatella</option>
                    <option value="Nutty Squirrel">Nutty Squirrel</option>
                    <option value="Ferrero Rocher">Ferrero Rocher</option>
                    <option value="Lemon Mango Dragonfruit">Lemon Mango Dragonfruit</option>
                    <option value="Forest Berries">Forest Berries</option>
                    <option value="Cafe Latte">Cafe Latte</option>
                    <option value="Pistachio">Pistachio</option>
                    <option value="Banana Nutella">Banana Nutella</option>
                    <option value="Turkish Coffee">Turkish Coffee</option>
                    <option value="Strawberry Dream">Strawberry Dream</option>
                    <option value="Mango">Mango</option>
                    <option value="Vegan Dark Chocolate">Vegan Dark Chocolate</option>
                    <option value="Minty Dream">Minty Dream</option>
                    <option value="Ranier Smores">Ranier Smores</option>
                    <option value="Bunny Kisses">Bunny Kisses</option>
                    <option value="Birthday Cake">Birthday Cake</option>
                    <option value="Hazelnut">Hazelnut</option>
                    <option value="Gianduia">Gianduia</option>
                    <option value="Kinder Bueno">Kinder Bueno</option>
                </select>
            </div>

            <div class="form-group">
                <label for="stockChange">Adjustment Amount</label>
                <input type="number" id="stockChange" placeholder="Qty" value="1">
            </div>

            <button onclick="updateStock()">Update Quantity</button>
            <button class="btn-toggle" onclick="toggleSeason()">Toggle Season</button>
        </aside>

        <main>
            <h2>Current Inventory Status</h2>
            <ul class="inventory-list" id="inventoryList"></ul>
        </main>

    </div>

    <footer>
        <p>&copy; 2026 Ice Cream Shop POS System. All Rights Reserved.</p>
    </footer>

</div>

<script>
    // Initialized default setup with Strawberry removed and all quantities at 0
    const defaultInventory = {
        "Vanilla": { qty: 0, outOfSeason: false },
        "Chocolate": { qty: 0, outOfSeason: false },
        "Mint Chip": { qty: 0, outOfSeason: false },
        "Lemon Cookie": { qty: 0, outOfSeason: false },
        "Stracciatella": { qty: 0, outOfSeason: false },
        "Nutty Squirrel": { qty: 0, outOfSeason: false },
        "Ferrero Rocher": { qty: 0, outOfSeason: false },
        "Lemon Mango Dragonfruit": { qty: 0, outOfSeason: false },
        "Forest Berries": { qty: 0, outOfSeason: false },
        "Cafe Latte": { qty: 0, outOfSeason: false },
        "Pistachio": { qty: 0, outOfSeason: false },
        "Banana Nutella": { qty: 0, outOfSeason: false },
        "Turkish Coffee": { qty: 0, outOfSeason: false },
        "Strawberry Dream": { qty: 0, outOfSeason: false },
        "Mango": { qty: 0, outOfSeason: false },
        "Vegan Dark Chocolate": { qty: 0, outOfSeason: false },
        "Minty Dream": { qty: 0, outOfSeason: false },
        "Ranier Smores": { qty: 0, outOfSeason: false },
        "Bunny Kisses": { qty: 0, outOfSeason: false },
        "Birthday Cake": { qty: 0, outOfSeason: false },
        "Hazelnut": { qty: 0, outOfSeason: false },
        "Gianduia": { qty: 0, outOfSeason: false },
        "Kinder Bueno": { qty: 0, outOfSeason: false }
    };

    // If you previously opened this in your browser, clear the older layout key
    // so the fresh 0-count baseline loads correctly.
    let inventory = JSON.parse(localStorage.getItem('iceCreamInventory'));
    
    if (!inventory || inventory.hasOwnProperty("Strawberry")) {
        inventory = defaultInventory;
        localStorage.setItem('iceCreamInventory', JSON.stringify(inventory));
    }

    function saveToStorage() {
        localStorage.setItem('iceCreamInventory', JSON.stringify(inventory));
    }

    function renderInventory() {
        const list = document.getElementById('inventoryList');
        list.innerHTML = ''; 

        for (const [flavor, data] of Object.entries(inventory)) {
            const li = document.createElement('li');
            li.className = `inventory-item ${data.outOfSeason ? 'out-of-season' : ''}`;
            
            // Text updated from "tubs" to "canisters"
            const statusLabel = data.outOfSeason 
                ? '<span class="status-badge oos">Out of Season</span>' 
                : `<span class="status-badge instock">${data.qty} canisters left</span>`;

            li.innerHTML = `<strong>${flavor}</strong> ${statusLabel}`;
            list.appendChild(li);
        }
    }

    function updateStock() {
        const flavor = document.getElementById('flavorSelect').value;
        const change = parseInt(document.getElementById('stockChange').value);

        if (isNaN(change)) {
            alert("Please enter a valid number!");
            return;
        }

        inventory[flavor].qty = Math.max(0, inventory[flavor].qty + change);
        saveToStorage();
        renderInventory();
    }

    function toggleSeason() {
        const flavor = document.getElementById('flavorSelect').value;
        inventory[flavor].outOfSeason = !inventory[flavor].outOfSeason;
        saveToStorage();
        renderInventory();
    }

    renderInventory();
</script>

</body>
</html>
